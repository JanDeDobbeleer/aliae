name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'packages/**'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.changelog.outputs.version }}
      body: ${{ steps.changelog.outputs.clean_changelog }}
      tag: ${{ steps.changelog.outputs.tag }}
      skipped: ${{ steps.changelog.outputs.skipped }}
    steps:
      - name: Checkout code 👋
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Create changelog ✍️
        id: changelog
        uses: TriPSs/conventional-changelog-action@ee43def3241429afddab215ba89090cbf64fb45c
        with:
          github-token: ${{ secrets.github_token }}
          skip-version-file: "true"
          output-file: "false"
          skip-commit: "true"
          skip-on-empty: "true"
          skip-tag: "true"

  artifacts:
    needs: changelog
    if: ${{ needs.changelog.outputs.skipped == 'false' }}
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: ${{ github.workspace }}/build
    steps:
      - name: Checkout code 👋
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Go 🗳
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5
        with:
          go-version: '1.26.5'
      - name: Pre Build 😸
        run: |
          ./pre.ps1 -Tag ${{ needs.changelog.outputs.tag }} -SDKVersion "10.0.26100.0"
      - name: Run GoReleaser 🚀
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29
        with:
          distribution: goreleaser
          version: latest
          args: build --clean
          workdir: src
        env:
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: build-artifacts
          path: |
            src/dist/aliae-*

  msix:
    needs:
      - changelog
      - artifacts
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    defaults:
      run:
        shell: pwsh
        working-directory: ${{ github.workspace }}/packages/msix
    steps:
      - name: Checkout code 👋
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: build-artifacts
          path: dist
      - name: Build installer 📦
        id: build
        env:
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          $version = '${{ needs.changelog.outputs.tag }}'.TrimStart("v")
          ./build.ps1 -Architecture ${{ matrix.arch }} -Version $version -Copy -Sign -SDKVersion "10.0.26100.0"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: msix-artifact-${{ matrix.arch }}
          path: |
            packages/msix/out/install-${{ matrix.arch }}.msix

  release:
    runs-on: ubuntu-latest
    needs:
      - changelog
      - artifacts
      - msix
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          merge-multiple: true
      - name: Create draft release 📝
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          tag_name: ${{ needs.changelog.outputs.tag }}
          body: ${{ needs.changelog.outputs.body }}
          fail_on_unmatched_files: true
          draft: true
          token: ${{ secrets.GH_PAT }}
          files: |
            *
      - name: Publish release 🎓
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh release edit ${{ needs.changelog.outputs.tag }} --draft=false --repo ${{ github.repository }}

  winget:
    needs:
      - changelog
      - release
    runs-on: windows-latest
    env:
      WINGETCREATE_TOKEN: ${{ secrets.WINGETCREATE_TOKEN }}
    steps:
    - name: Create manifest and submit PR 📦
      shell: pwsh
      run: |
        Write-Host "Preparing to submit to WinGet repository..." -ForegroundColor Green

        # Install the latest wingetcreate exe
        # Need to do things this way, see https://github.com/PowerShell/PowerShell/issues/13138
        Write-Verbose "Importing Appx module using Windows PowerShell compatibility"
        Import-Module Appx -UseWindowsPowerShell -ErrorAction Stop

        # Download and install Winget-Create msixbundle
        $appxBundleFile = Join-Path -Path $env:TEMP -ChildPath "wingetcreate.msixbundle"
        Write-Verbose "Downloading wingetcreate to: $appxBundleFile"

        Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest/msixbundle" -OutFile $appxBundleFile -ErrorAction Stop
        Add-AppxPackage -Path $appxBundleFile -ErrorAction Stop

        Write-Verbose "Successfully installed wingetcreate"

        # Submit the PR to WinGet repository
        Write-Host "Submitting pull request to WinGet repository..." -ForegroundColor Green

        $version = "${{ needs.changelog.outputs.tag }}"
        $version = $version.TrimStart('v')

        $urls = @(
            "https://github.com/JanDeDobbeleer/aliae/releases/download/v$version/install-x64.msix|x64",
            "https://github.com/JanDeDobbeleer/aliae/releases/download/v$version/install-arm64.msix|arm64"
        )

        wingetcreate update JanDeDobbeleer.Aliae --version $version --token $env:WINGETCREATE_TOKEN --submit --urls $urls
